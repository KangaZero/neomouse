name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-test:
    name: Build & test
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          sw_vers
          xcodebuild -version
          swift --version

      - name: Lint (swift format lint --strict)
        run: swift format lint --strict --recursive Sources Tests

      - name: Build (debug)
        run: swift build

      - name: Test
        run: swift test
