#:schema ./schema/settings.schema.json
# Neomouse configuration. TOML 1.1-compatible (no features beyond TOML 1.0 used).
# Spec: https://toml.io/en/v1.0.0
# Schema: ./schema/settings.schema.json — Taplo enforces it (`just check-config`).
#
# Resolution at startup (first match wins):
#   1. $NEOMOUSE_CONFIG
#   2. ~/.config/neomouse/settings.toml
#   3. ~/Library/Application Support/neomouse/settings.toml

[grid]
inset = 10.0
divisions = 5
inner_divisions = 3
# Outer/inner cell labels. One char per cell, left-to-right then top-to-bottom.
# Length must be >= divisions * divisions (and inner_divisions * inner_divisions).
find_mode_characters = "abcdefghijklmnopqrstuvwxyz"
find_mode_inner_characters = "abcdefghijklmnopqrstuvwxyz"
is_always_show_inner_characters = true

[motion]
# rows_on_screen / columns_on_screen: integer cell count for that axis,
# OR the literal string "automatic" to derive from screen size at runtime.
#   - rows "automatic"     → screen height / 20pt (baseline)
#   - columns "automatic"  → derived to keep cells square against rows
# Step size for hjkl + ruler overlay cells = usable.dim / count.
rows_on_screen = "automatic"
columns_on_screen = "automatic"
is_clamp_cursor_to_current_screen = false

[visual]
minimum_highlight_width = 5

[gesture]
zoom_step_value = 0.1      # 0.01 .. 10
increments_per_gesture = 5
degrees_to_rotate = 90.0

[commands]
# Commands exposed in command-line mode.
available = ["numbers", "relativenumbers", "delmarks"]

[configuration]
# When true, the CGEventTap runs in .defaultTap mode and swallows most plain
# keypresses (a-z, 0-9) while neomouse is active. Cmd / Ctrl / Opt chords and
# Esc / Tab / arrows / F-keys still flow to the focused app. When false, the
# tap is .listenOnly — every key passes through, neomouse just observes.
is_disable_key_input = true
max_session_count = 10
# Open a fresh session on launch instead of resuming the most recent one.
new_session_on_open = true
# Which mode neomouse boots into. One of: "disabled", "normal", "find",
# "command", "menu". "disabled" leaves neomouse dormant until Cmd-E activates.
mode_on_start = "normal"

# ---------------------------------------------------------------------------
# [theme.*] — per-element visual overrides
# ---------------------------------------------------------------------------
# Every sub-section is optional; missing keys keep the built-in defaults.
# Colors are hex strings: "#rgb", "#rgba", "#rrggbb", "#rrggbbaa" (the # is
# optional). Fonts take `family` (empty = system), `size`, `weight`
# (ultra_light..black) and `design` (default | monospaced | serif | rounded).
# Anchors are one of: top | top_left | top_right | center | center_left |
# center_right | bottom | bottom_left | bottom_right.
# Materials are: ultra_thin | thin | regular | thick | ultra_thick | bar | hud.
#
# See schema/settings.schema.json for the full list of knobs per element —
# what's below is a starting taste, not the complete menu.

[theme.numbers_overlay]
# Render the line-number gutter on the right edge of the screen instead of
# the default left. Useful when a left-side dock or window manager strip
# competes with the gutter for screen edge real estate.
direction = "left"

[theme.toast]
# Top-right corner of the active screen, inset by 20pt on each axis.
anchor = "top_right"
offset_x = 20
offset_y = 20

