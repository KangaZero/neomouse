#:schema ./schema/settings.schema.json
# Neomouse configuration. TOML 1.1-compatible (no features beyond TOML 1.0 used).
# Spec: https://toml.io/en/v1.0.0
# Schema: ./schema/settings.schema.json — Taplo enforces it (`just check-config`).
#
# Resolution at startup (first match wins):
#   1. $NEOMOUSE_CONFIG
#   2. ~/.config/neomouse/settings.toml
#   3. ~/Library/Application Support/neomouse/settings.toml

[grid]
inset = 10.0
divisions = 5
inner_divisions = 3
# Outer/inner cell labels. One char per cell, left-to-right then top-to-bottom.
# Length must be >= divisions * divisions (and inner_divisions * inner_divisions).
find_mode_characters = "abcdefghijklmnopqrstuvwxyz"
find_mode_inner_characters = "abcdefghijklmnopqrstuvwxyz"
is_always_show_inner_characters = true

[motion]
# rows_on_screen / columns_on_screen: integer cell count for that axis,
# OR the literal string "automatic" to derive from screen size at runtime.
#   - rows "automatic"     → screen height / 20pt (baseline)
#   - columns "automatic"  → derived to keep cells square against rows
# Step size for hjkl + ruler overlay cells = usable.dim / count.
rows_on_screen = "automatic"
columns_on_screen = "automatic"
is_clamp_cursor_to_current_screen = false

[visual]
minimum_highlight_width = 5

[gesture]
zoom_step_value = 0.1      # 0.01 .. 10
increments_per_gesture = 5
degrees_to_rotate = 90.0

[commands]
# Commands exposed in command-line mode.
available = ["numbers", "relativenumbers", "delmarks"]

[configuration]
# When true, the CGEventTap runs in .defaultTap mode and swallows most plain
# keypresses (a-z, 0-9) while neomouse is active. Cmd / Ctrl / Opt chords and
# Esc / Tab / arrows / F-keys still flow to the focused app. When false, the
# tap is .listenOnly — every key passes through, neomouse just observes.
is_disable_key_input = true
max_session_count = 10
# Open a fresh session on launch instead of resuming the most recent one.
new_session_on_open = true
# Which mode neomouse boots into. One of: "disabled", "normal", "find",
# "command", "menu". "disabled" leaves neomouse dormant until Cmd-E activates.
mode_on_start = "normal"

# ---------------------------------------------------------------------------
# [theme.*] — per-element visual overrides
# ---------------------------------------------------------------------------
# Every key below is at its built-in default. Remove or comment out any line
# you don't want to override; the runtime falls back to the same value the
# struct supplies. Whole sub-sections are optional too — drop a section
# entirely and that element uses defaults.
#
# Colors:    "#rgb", "#rgba", "#rrggbb", "#rrggbbaa". Leading # is optional.
# Fonts:     { family = "", size = N, weight = "...", design = "..." }
#              family = "" → system font (recommended).
#              weight: ultra_light, thin, light, regular, medium, semibold,
#                      bold, heavy, black.
#              design: default, monospaced, serif, rounded.
# Anchors:   top, top_left, top_right, center, center_left, center_right,
#            bottom, bottom_left, bottom_right. Combine with x_offset /
#            y_offset (in points) to push inward from the anchor edge.
# Materials: ultra_thin, thin, regular, thick, ultra_thick, bar, hud.

# Find-mode big-grid AND special-find dense-grid around the cursor share
# this section (per design — same color/font palette for both). The
# cursor_surrounded_* keys only affect the dense grid.
[theme.grid]
background              = "#00000026"  # 0.15 black overlay tint
outer_line_color        = "#ffffff99"  # 0.6 white
outer_label_color       = "#007aff"    # SwiftUI accent blue
outer_label_font        = { family = "", size = 60, weight = "bold", design = "default" }
inner_line_color        = "#ffffff99"
inner_faint_line_color  = "#ffffff4d"  # 0.3 white — non-focused cell grid
inner_label_color       = "#ffffff"
inner_label_font        = { family = "", size = 12, weight = "regular", design = "default" }
cursor_surrounded_box_size    = 200
cursor_surrounded_divisions   = 6
cursor_surrounded_label_font  = { family = "", size = 14, weight = "semibold", design = "monospaced" }

# Ruler / line-number gutter that follows the cursor in find/normal modes.
# `direction` flips the gutter to the right edge — useful when a dock or
# window-manager strip competes with the default left edge.
[theme.numbers_overlay]
direction               = "left"       # "left" | "right" — which side the row gutter sits on
column_strip_direction  = "top"        # "top" | "bottom" — which edge the column strip sits on
gutter_background       = "#0000008c"  # 0.55 black
cursor_line_highlight   = "#ffff002e"  # 0.18 yellow
cursor_column_highlight = "#ffff002e"
cursor_text_color       = "#ffff00"
text_color              = "#ffffffbf"  # 0.75 white
font                    = { family = "", size = 12, weight = "regular", design = "monospaced" }
gutter_width            = 20
column_strip_height     = 20

[theme.command_line]
anchor                 = "bottom"
x_offset               = 0
y_offset               = 100
width                  = 420
height                 = 60
corner_radius          = 8
text_font              = { family = "", size = 13, weight = "regular", design = "monospaced" }
text_color             = "#e6e6e6"    # 0.9 white
prefix_color           = "#999999"    # 0.6 white — the leading ":" colon
suggestion_font        = { family = "", size = 13, weight = "regular", design = "monospaced" }
suggestion_text_color  = "#e6e6e6"
suggestion_highlight   = "#007aff59"  # accent blue @ 0.35 — highlighted wildmenu row
material               = "regular"

[theme.marks_menu]
anchor                   = "center"
width                    = 500
height                   = 500
corner_radius            = 8
material                 = "ultra_thin"
header_font              = { family = "", size = 11, weight = "semibold", design = "default" }
mark_label_font          = { family = "", size = 12, weight = "medium", design = "monospaced" }
cell_font                = { family = "", size = 12, weight = "regular", design = "monospaced" }
empty_message_font       = { family = "", size = 12, weight = "regular", design = "default" }
selected_row_background  = "#007aff59"  # accent blue @ 0.35
row_padding_x            = 12
row_padding_y            = 4

[theme.register_menu]
anchor                     = "center"
width                      = 920
height                     = 380
corner_radius              = 12
material                   = "ultra_thin"
card_width                 = 220
card_height                = 280
card_padding_x             = 4
card_padding_y             = 4
view_padding               = 12
search_font                = { family = "", size = 13, weight = "regular", design = "default" }
app_name_font              = { family = "", size = 11, weight = "medium",  design = "default" }
register_label_font        = { family = "", size = 12, weight = "bold",    design = "monospaced" }
card_text_font             = { family = "", size = 11, weight = "regular", design = "monospaced" }
badge_font                 = { family = "", size = 11, weight = "regular", design = "monospaced" }
register_badge_background  = "#007aff59"  # accent blue @ 0.35
selected_card_border       = "#007aff"
unselected_card_border     = "#ffffff14"  # 0.08 white
card_shadow_selected       = "#00000059"  # 0.35 black
card_shadow_unselected     = "#00000026"  # 0.15 black
content_background         = "#00000014"  # 0.08 black

[theme.help_dialog]
anchor             = "center"
width              = 700
height             = 850
padding            = 20
header_color       = "#007aff"
header_font        = { family = "", size = 17, weight = "semibold", design = "default" }
keybind_font       = { family = "", size = 13, weight = "regular",  design = "monospaced" }
description_color  = "#999999"

[theme.visual_highlight]
fill = "#007aff4d"  # accent blue @ 0.3 — the selection rectangle tint

[theme.toast]
anchor          = "top_right"
x_offset        = 20
y_offset        = 20
width           = 300
height          = 60
corner_radius   = 12
padding_x       = 16
padding_y       = 12
outer_padding   = 10
background      = "#000000d9"  # 0.85 black
text_color      = "#ffffff"
text_font       = { family = "", size = 13, weight = "medium", design = "default" }

[theme.key_cast]
anchor         = "top"
x_offset       = 0
y_offset       = 12
width          = 240
height         = 48
corner_radius  = 10
padding_x      = 18
padding_y      = 10
background     = "#000000"
text_color     = "#ffffff"
border_color   = "#ffffff2e"  # 0.18 white
shadow_color   = "#0000008c"  # 0.55 black
text_font      = { family = "", size = 24, weight = "bold", design = "monospaced" }
#
# [keymap]
# # Motion keys. "modifier + key(s)" 
# # key(s) can be a case-sensitive single char or a key name like "Enter", "Space", "Tab", "Backspace", "Delete", "UpArrow", "down", "left", "right"
# # modifier: "ctrl", "control", "option", "alt", "shift", "cmd", "command"
# # "ctrl" and "control" are the same, as are "option" and "alt". "cmd" or "command" is the Command key on Mac.
# # eg "ctrl + h" or "alt + ctrl + h"
# #
# # numbers cannot be used
# motion_x_minus = "h"
# motion_y_minus = "j"
# motion_x_plus = "k"
# motion_y_plus = "l"
#
# motion_x_min = "0" # This is only exception
# motion_x_max = "$"
# motion_y_min = "G" # also same as shift + g
# motion_y_max = "gg" 
#
#

